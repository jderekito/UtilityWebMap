<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>U2 Warning Report – Heatmap</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
    header {
      padding: 12px 20px; background: #0f0f1a; border-bottom: 1px solid #2a2a4a;
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #fff; letter-spacing: 0.03em; }
    .stats { margin-left: auto; display: flex; gap: 16px; }
    .stat { text-align: center; }
    .stat-val { font-size: 1.1rem; font-weight: 700; color: #7eb8f7; }
    .stat-lbl { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
    #controls {
      padding: 10px 16px; background: #13132a; border-bottom: 1px solid #2a2a4a;
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap; font-size: 0.82rem;
    }
    .ctrl-group { display: flex; align-items: center; gap: 8px; }
    #controls label { color: #aaa; white-space: nowrap; }
    #controls select {
      background: #1e1e3a; border: 1px solid #3a3a5a;
      color: #eee; border-radius: 4px; padding: 3px 8px; font-size: 0.8rem;
    }
    input[type=range] {
      -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px;
      background: #3a3a6a; outline: none; width: 90px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: #7eb8f7; cursor: pointer;
    }
    .slider-val { color: #7eb8f7; font-weight: 600; min-width: 28px; }
    .mode-btn {
      background: #1e1e3a; border: 1px solid #3a3a5a; color: #aaa;
      border-radius: 4px; padding: 4px 12px; cursor: pointer; font-size: 0.8rem; transition: all 0.15s;
    }
    .mode-btn.active { background: #2a3a6a; border-color: #7eb8f7; color: #7eb8f7; font-weight: 600; }
    #count-label { color: #7eb8f7; font-weight: 600; margin-left: auto; }
    .grad-bar {
      width: 120px; height: 10px; border-radius: 5px;
      background: linear-gradient(to right, #000080, #0000ff, #00ffff, #00ff00, #ffff00, #ff0000);
      border: 1px solid #3a3a5a;
    }
    #map { flex: 1; }
    .leaflet-popup-content-wrapper { background: #1a1a2e; color: #eee; border: 1px solid #3a3a5a; border-radius: 6px; }
    .leaflet-popup-tip { background: #1a1a2e; }
    .popup-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; color: #7eb8f7; }
    .popup-row { font-size: 0.78rem; color: #bbb; margin: 2px 0; }
    .popup-row span { color: #eee; }
  </style>
</head>
<body>

<header>
  <h1>🌡 U2 Warning Report – Heatmap</h1>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="pt-count">13,073</div><div class="stat-lbl">Points Shown</div></div>
    <div class="stat"><div class="stat-val">Palm Beach</div><div class="stat-lbl">County, FL</div></div>
  </div>
</header>

<div id="controls">
  <div class="ctrl-group">
    <button class="mode-btn active" id="btn-heat" onclick="setMode('heat')">🌡 Heatmap</button>
    <button class="mode-btn" id="btn-dots" onclick="setMode('dots')">● Points</button>
    <button class="mode-btn" id="btn-both" onclick="setMode('both')">Both</button>
  </div>
  <div class="ctrl-group">
    <label>Month:</label>
    <select id="month-filter">
      <option value="all">All (13,073)</option>
      <option value="0">Month 0 (5,965)</option>
      <option value="1">Month 1 (6,441)</option>
      <option value="2">Month 2 (312)</option>
      <option value="7">Month 7 (355)</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Radius:</label>
    <input type="range" id="radius-sl" min="5" max="50" value="20"/>
    <span class="slider-val" id="radius-val">20</span>
  </div>
  <div class="ctrl-group">
    <label>Blur:</label>
    <input type="range" id="blur-sl" min="1" max="40" value="15"/>
    <span class="slider-val" id="blur-val">15</span>
  </div>
  <div class="ctrl-group">
    <label>Intensity:</label>
    <input type="range" id="intensity-sl" min="1" max="20" value="5"/>
    <span class="slider-val" id="intensity-val">5</span>
  </div>
  <div class="ctrl-group">
    <span style="color:#888;font-size:0.75rem;">Low</span>
    <div class="grad-bar"></div>
    <span style="color:#888;font-size:0.75rem;">High</span>
  </div>
  <span id="count-label">Showing 13,073 points</span>
</div>

<div id="map"></div>

const map = L.map('map', {center:[26.758,-80.216], zoom:12, preferCanvas:true});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom:19
}).addTo(map);

let heatLayer = null, dotLayers = [], currentMode = 'heat';

function getFiltered() {
  const mf = document.getElementById('month-filter').value;
  return mf === 'all' ? RAW : RAW.filter(r => r[2] == mf);
}

function clearLayers() {
  if (heatLayer) { heatLayer.remove(); heatLayer = null; }
  dotLayers.forEach(d => d.remove());
  dotLayers = [];
}

function render() {
  clearLayers();
  const data = getFiltered();
  const radius = +document.getElementById('radius-sl').value;
  const blur   = +document.getElementById('blur-sl').value;
  const intensity = +document.getElementById('intensity-sl').value;

  document.getElementById('pt-count').textContent = data.length.toLocaleString();
  document.getElementById('count-label').textContent = 'Showing ' + data.length.toLocaleString() + ' points';

  if (currentMode === 'heat' || currentMode === 'both') {
    const heatData = data.map(r => [r[0], r[1], intensity / 10]);
    heatLayer = L.heatLayer(heatData, {
      radius, blur, maxZoom: 17,
      gradient: {0.0:'#000080',0.25:'#0000ff',0.45:'#00ffff',0.65:'#00ff00',0.8:'#ffff00',1.0:'#ff0000'}
    }).addTo(map);
  }

  if (currentMode === 'dots' || currentMode === 'both') {
    data.forEach(r => {
      const c = L.circleMarker([r[0],r[1]], {
        radius: 3, weight: 0.5,
        color: 'rgba(0,0,0,0.4)',
        fillColor: MONTH_COLORS[r[2]] || '#aaa',
        fillOpacity: currentMode === 'both' ? 0.55 : 0.82,
      }).addTo(map);
      c.on('click', () => {
        L.popup({maxWidth:200}).setLatLng([r[0],r[1]])
          .setContent(`<div class="popup-title">Point</div>
            <div class="popup-row">Lat: <span>${r[0].toFixed(6)}</span></div>
            <div class="popup-row">Lon: <span>${r[1].toFixed(6)}</span></div>
            <div class="popup-row">Month: <span>${MONTH_LABELS[r[2]] || r[2]}</span></div>`)
          .openOn(map);
      });
      dotLayers.push(c);
    });
  }
}

function setMode(mode) {
  currentMode = mode;
  ['heat','dots','both'].forEach(m => document.getElementById('btn-'+m).classList.toggle('active', m===mode));
  render();
}

['month-filter','radius-sl','blur-sl','intensity-sl'].forEach(id => {
  document.getElementById(id).addEventListener('input', function() {
    if (this.id==='radius-sl')    document.getElementById('radius-val').textContent = this.value;
    if (this.id==='blur-sl')      document.getElementById('blur-val').textContent = this.value;
    if (this.id==='intensity-sl') document.getElementById('intensity-val').textContent = this.value;
    render();
  });
});

render();
</script>
